<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0835"/>
      <stop offset="100%" stop-color="#08030f"/>
    </linearGradient>
    <linearGradient id="logo" x1="96" y1="30" x2="96" y2="162" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="rgba(139,92,246,0.4)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Top glow -->
  <ellipse cx="96" cy="0" rx="100" ry="70" fill="url(#glow)"/>
  <!-- Mic body -->
  <rect x="78" y="42" width="36" height="62" rx="18" fill="url(#logo)"/>
  <!-- Mic stand arc -->
  <path d="M60 98 C60 132 132 132 132 98" stroke="url(#logo)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Mic line -->
  <line x1="96" y1="132" x2="96" y2="150" stroke="url(#logo)" stroke-width="10" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="74" y1="150" x2="118" y2="150" stroke="url(#logo)" stroke-width="10" stroke-linecap="round"/>
</svg>
